# omnirobot_control — tüm node parametreleri
# skill.md §3-§6 ile uyumlu

# ── Donanım ─────────────────────────────────────────────────────────────────
lidar_node:
  ros__parameters:
    port:      /dev/lidar        # YDLidar X2 — udev symlink → ttyUSB0
    frame_id:  laser
    rate_hz:   20.0
    range_min: 0.28             # m — robot gövdesi kör bölgesi (donanım parçaları)
    range_max: 8.0              # m

kinematics_node:
  ros__parameters:
    wheel_radius:         0.05        # m
    robot_radius:         0.25        # m — tekerlek merkezi–robot merkezi mesafesi
    roboclaw_port_front:  /dev/roboclaw_front   # USB port 1-1.1 — W1 M2, W2 M1
    roboclaw_port_rear:   /dev/roboclaw_rear    # USB port 1-1.3 — W3 M2
    roboclaw_baud:        38400
    dt:                   0.05        # s — enkoder okuma periyodu (20 Hz)
    # Teker–RoboClaw bağlantısı (değiştirme):
    #   W1 (β=-60°) → 0x80 M2
    #   W2 (β=+60°) → 0x80 M1
    #   W3 (β=180°) → 0x81 M2

# ── Algılama ─────────────────────────────────────────────────────────────────
perception_node:
  ros__parameters:
    dbscan_eps:     0.10        # m — DBSCAN yarıçapı
    dbscan_min_pts: 8           # gürültü filtresi (artırıldı: sahte küme azaltımı)
    max_dist:       4.0         # m — bu ötesi filtrele
    self_filter_r:  0.30        # m — robot gövdesi filtresi (yakın insanı da algıla)
    dt:             0.05        # s
    kalman_Q:       0.01        # süreç gürültüsü
    kalman_R:       0.05        # ölçüm gürültüsü
    v_dynamic:      0.04        # m/s — dinamik sınıf eşiği
    max_miss:       5           # frame — track silme eşiği
    match_dist:     0.30        # m — Kalman eşleştirme eşiği
    min_hits:       1           # frame — engel ilk görüldüğünde yayınla (gecikme yok)
    dyn_r_min:      0.175       # m — dinamik engel min yarıçapı (35 cm çap — insan bacağı alt sınırı)
    dyn_r_max:      0.275       # m — dinamik engel max yarıçapı (55 cm çap — insan gövdesi üst sınırı)

# ── Global planlama ───────────────────────────────────────────────────────────
global_planner_node:
  ros__parameters:
    n_max:      3000            # RRT* max iterasyon (artırıldı: dar geçit)
    eta:        0.35            # m — max steer adımı
    p_goal:     0.15            # hedef bias olasılığı
    d_safe:     0.20            # m — engel şişirme marjı (azaltıldı: dar geçitten yol bul)
    map_margin: 2.0             # m — arama alanı genişletme

# ── Trayektori yumuşatma ─────────────────────────────────────────────────────
trajectory_smoother_node:
  ros__parameters:
    v_nominal:   0.28           # m/s
    T_min:       0.30           # s — min segment süresi
    theta_mode:  fixed          # fixed: omni robot döndürülmez, sadece öteleme
    theta_fixed: 0.0            # rad — sabit yönelim (x ekseni ileri)
    d_safe:      0.35           # m
    check_dt:    0.05           # s — çarpışma örnekleme adımı

# ── Navigatör (DWA — Dynamic Window Approach) ────────────────────────────────
navigator_node:
  ros__parameters:
    dt:              0.05        # s  — kontrol döngüsü (20 Hz)
    v_max:           0.28        # m/s — azaltıldı: lidar 10Hz @ 0.28m/s → 0.028m/döngü
    lookahead:       0.70        # m  — Pure Pursuit carrot ufku (normal mod)
    pos_tol:         0.10        # m  — varış toleransı
    robot_radius:    0.27        # m  — fiziksel yarıçap
    dwa_clearance:   0.42        # m  — robot_r(0.27)+0.15m margin: 0.30m yüzey boşluğu
    d_safe:          0.55        # m  — bu mesafeye girince hız azaltılır
    # DWA parametreleri
    dwa_alpha:       0.40        # heading puanı ağırlığı (azaltıldı: engel kaçınma öncelikli)
    dwa_beta:        0.50        # clearance puanı ağırlığı (artırıldı)
    dwa_gamma:       0.10        # hız puanı ağırlığı
    dwa_n_dir:       36          # yön örnekleme (her 10°)
    dwa_n_speed:     8           # hız örnekleme kademesi
    dwa_sim_time:    1.5         # s  — simülasyon ufku (uzatıldı: 2. engeli erken görür)
    dwa_sim_steps:   10          # simülasyon adım sayısı
    dwa_max_clear:   2.0         # m  — clearance normalize referansı
    # Tıkanma & zaman aşımı
    stuck_threshold: 0.05        # m
    stuck_window:    5.0         # s
    replan_timeout:  8.0         # s
    goal_wait:       2.0         # s
